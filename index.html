<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cinematic Friend Page</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  margin:0; height:100vh; overflow:hidden; color:#fff;
  background: radial-gradient(1200px 600px at 20% 10%, #7b8cff33, transparent),
              radial-gradient(1000px 600px at 80% 90%, #ff7eb333, transparent),
              linear-gradient(135deg,#0f1226,#1a1f4a);
  display:flex; align-items:center; justify-content:center;
}
.container{
  width:360px; max-width:92vw; text-align:center;
  background:rgba(255,255,255,.08);
  backdrop-filter: blur(16px);
  border:1px solid rgba(255,255,255,.15);
  border-radius:22px; padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  transform: translateY(10px); opacity:0; animation:in .6s ease forwards;
}
@keyframes in{to{transform:none; opacity:1}}
.hidden{display:none}
h2{margin:0 0 16px; font-weight:600}
button{
  width:100%; margin:10px 0; padding:12px 14px; border:0; border-radius:12px;
  background:linear-gradient(45deg,#ff7eb3,#ff4e91);
  color:#fff; cursor:pointer; font-size:15px;
  transition:.25s;
}
button:hover{transform:translateY(-2px) scale(1.03); box-shadow:0 10px 25px rgba(255,78,145,.45)}
.typing{display:inline-block; opacity:0; transform:translateY(10px); animation:show .8s ease forwards}
.typing.delay{animation-delay:1.8s}
@keyframes show{to{opacity:1; transform:none}}
.small{opacity:.8; font-size:13px}
</style>
</head>
<body><!-- 🔊 AUDIO (FINAL WORKING FIX) --><audio id="bgMusic" preload="auto" loop playsinline>
  <source src="music.mp3" type="audio/mpeg">
</audio><div class="container" id="page1">
  <h2>Who are you? 👀</h2>
  <button onclick="go('page2')">School Friend</button>
  <button onclick="go('page2')">College Friend</button>
  <button onclick="go('page2')">Best Friend</button>
  <button onclick="go('page2')">Friend</button>
</div><div class="container hidden" id="page2">
  <h2>Select Gender 💫</h2>
  <button onclick="go('girl')">Girl</button>
  <button onclick="go('boy')">Boy</button>
</div><div class="container hidden" id="boy">
  <h2>Not Available ❌</h2>
  <p class="small">Try the other option 😉</p>
</div><div class="container hidden" id="girl">
  <h2>Are you Sayantani? 💖</h2>
  <button onclick="go('msg1')">Yes</button>
</div><div class="container hidden" id="msg1">
  <h2>I wanna tell something 😶‍🌫️</h2>
  <button onclick="finalStep()">Click</button>
</div><div class="container hidden" id="msg2">
  <h2 class="typing">You are cutest dustu friend ever 😺😈😹😻</h2>
  <h3 class="typing delay">Can you be my bestie? 🥹</h3>
</div><script>
const pages = document.querySelectorAll('.container');
function go(id){ 
  pages.forEach(p=>p.classList.add('hidden')); 
  document.getElementById(id).classList.remove('hidden'); 
}

// 🔥 REAL FIX (Mobile + Chrome autoplay issue solved)
function finalStep(e){
  go('msg2');
  const audio = document.getElementById('bgMusic');
  audio.currentTime = 0;

  // IMPORTANT: resume context inside user click
  const playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        console.log("Audio started");
      })
      .catch(() => {
        // fallback: force play on next touch
        document.body.addEventListener('touchstart', () => {
          audio.play();
        }, { once: true });
      });
  }
}

// extra strong fallback
window.addEventListener('touchstart', function once(){
  const audio = document.getElementById('bgMusic');
  audio.play().catch(()=>{});
  window.removeEventListener('touchstart', once);
});
</script></body>
</html>
