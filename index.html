<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Friend Page</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet"><style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    color: white;
}

.container {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    width: 340px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeIn 0.8s ease;
}

h2, h3 {
    margin-bottom: 20px;
}

button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #ff7eb3, #ff4e91);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(255, 78, 145, 0.5);
}

.hidden {
    display: none;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.typing {
    border-right: 3px solid white;
    white-space: normal;
    overflow: hidden;
    display: inline-block;
    max-width: 100%;
    animation: fadeText 2s ease forwards, blink 0.7s infinite;
}

@keyframes fadeText {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

</style></head>
<body><div class="container" id="page1">
    <h2>Who are you? 👀</h2>
    <button onclick="nextPage('page2')">School Friend</button>
    <button onclick="nextPage('page2')">College Friend</button>
    <button onclick="nextPage('page2')">Best Friend</button>
    <button onclick="nextPage('page2')">Friend</button>
</div><div class="container hidden" id="page2">
    <h2>Select Gender 💫</h2>
    <button onclick="selectGirl()">Girl</button>
    <button onclick="nextPage('end')">Boy</button>
</div><div class="container hidden" id="girlPage">
    <h2>Are you Sayantani? 💖</h2>
    <button onclick="nextPage('message1')">Yes</button>
</div><div class="container hidden" id="message1">
    <h2>I wanna tell something 😶‍🌫️</h2>
    <button onclick="nextPage('message2')">Click</button>
</div><div class="container hidden" id="message2">
    <h2 class="typing">You are cutest dustu friend ever 😺😈😹😻</h2>
    <h3 class="typing" style="animation-delay:3s">Can you be my bestie? 🥹</h3>
</div><script>
function nextPage(id) {
    document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function selectGirl() {
    nextPage('girlPage');
}
</script></body>
</html>
